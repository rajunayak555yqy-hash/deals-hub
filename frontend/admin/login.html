<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealHub Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #030712; }
    .gradient-text { background: linear-gradient(135deg,#f97316,#ef4444); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .login-card { background: #111827; border: 1px solid #1f2937; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .inp { background: #1f2937; border: 1px solid #374151; color: white; width:100%; padding:12px 16px; border-radius:12px; outline:none; transition:border 0.2s; font-size:14px; }
    .inp:focus { border-color:#f97316; box-shadow:0 0 0 2px rgba(249,115,22,0.15); }
    .btn { width:100%; padding:13px; background:linear-gradient(135deg,#f97316,#ef4444); color:white; font-family:'Syne',sans-serif; font-weight:800; border-radius:12px; border:none; cursor:pointer; font-size:15px; transition:all 0.2s; }
    .btn:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(249,115,22,0.4); }
    .btn:disabled { opacity:0.6; transform:none; }
    .error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; padding:10px 14px; border-radius:10px; font-size:13px; display:none; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="text-3xl font-extrabold" style="font-family:'Syne',sans-serif;">Deal<span style="color:#f97316">Hub</span></a>
      <p class="text-gray-500 text-sm mt-2">Admin Dashboard</p>
    </div>
    <div class="login-card rounded-2xl p-8">
      <h1 class="text-xl font-bold text-white mb-2" style="font-family:'Syne',sans-serif;">Welcome back 👋</h1>
      <p class="text-gray-500 text-sm mb-6">Sign in to manage your deals</p>
      <div id="errorMsg" class="error-msg mb-4"></div>
      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1.5">Username</label>
          <input type="text" id="username" class="inp" placeholder="admin" required autocomplete="username" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1.5">Password</label>
          <input type="password" id="password" class="inp" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" id="loginBtn" class="btn mt-2">Sign In →</button>
      </form>
      <p class="text-center text-xs text-gray-600 mt-6">Default: admin / Admin@123</p>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('adminToken');
    if (token) {
      fetch('/api/admin/verify', { headers: { Authorization: 'Bearer ' + token } })
        .then(r => r.json()).then(d => { if (d.success) window.location.href = '/admin'; })
        .catch(() => {});
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      err.style.display = 'none';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = '/admin';
        } else {
          err.textContent = data.message || 'Invalid credentials';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In →';
        }
      } catch (error) {
        err.textContent = 'Server error. Please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    }
  </script>
</body>
</html>
