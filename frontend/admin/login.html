<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealHub — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #030712;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    h1, h2, .syne { font-family: 'Syne', sans-serif; }

    /* ── Background glow ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(249,115,22,0.08), transparent);
      pointer-events: none;
    }

    /* ── Card ── */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 24px;
      padding: 2.25rem 2rem 2rem;
      position: relative;
      animation: fadeUp 0.4s cubic-bezier(.4,0,.2,1);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f97316, #ef4444);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      flex-shrink: 0;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #f9fafb;
      line-height: 1.2;
    }
    .brand-name span { color: #f97316; }
    .brand-sub {
      font-size: 12px;
      color: #4b5563;
      margin-top: 2px;
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #6b7280;
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: #d1d5db; }

    /* ── Headings ── */
    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #f9fafb;
      margin-bottom: 6px;
    }
    .login-desc {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 1.75rem;
    }

    /* ── Error box ── */
    .error-box {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 1.25rem;
    }
    .error-box.show { display: flex; animation: shake 0.3s ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }

    /* ── Fields ── */
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 6px;
    }
    .field-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .field-wrap .field-icon {
      position: absolute;
      left: 12px;
      font-size: 17px;
      color: #4b5563;
      pointer-events: none;
      z-index: 1;
    }
    .field-wrap input {
      width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 11px 14px 11px 38px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: #f9fafb;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-wrap input::placeholder { color: #4b5563; }
    .field-wrap input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }
    .field-wrap .eye-btn {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      color: #4b5563;
      cursor: pointer;
      padding: 6px;
      font-size: 17px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
      z-index: 1;
    }
    .field-wrap .eye-btn:hover { color: #9ca3af; }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 12px;
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(249,115,22,0.25);
    }
    .submit-btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(249,115,22,0.4);
    }
    .submit-btn:active:not(:disabled) { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .submit-btn.success { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 20px rgba(16,185,129,0.3); }

    /* ── Spinner ── */
    .spinner {
      width: 17px;
      height: 17px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Hint ── */
    .hint {
      text-align: center;
      font-size: 12px;
      color: #374151;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid #1f2937;
    }
    .hint code {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 1px 7px;
      color: #9ca3af;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0;
    }
    .divider hr {
      flex: 1;
      border: none;
      border-top: 1px solid #1f2937;
    }
    .divider span { font-size: 12px; color: #374151; }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Back to site -->
    <a href="/" class="back-link">
      <i class="ti ti-arrow-left"></i>
      Back to site
    </a>

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <i class="ti ti-tag"></i>
      </div>
      <div>
        <div class="brand-name">Deal<span>Hub</span></div>
        <div class="brand-sub">Admin Dashboard</div>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="login-title">Welcome back 👋</h1>
    <p class="login-desc">Sign in to manage your deals</p>

    <!-- Error box -->
    <div class="error-box" id="errorBox">
      <i class="ti ti-alert-circle" style="font-size:16px;flex-shrink:0;"></i>
      <span id="errorText">Invalid username or password.</span>
    </div>

    <!-- Form -->
    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

      <!-- Username -->
      <div class="field">
        <label for="username">Username</label>
        <div class="field-wrap">
          <i class="ti ti-user field-icon"></i>
          <input
            type="text"
            id="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="field-wrap">
          <i class="ti ti-lock field-icon"></i>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="eye-btn" onclick="togglePassword()" aria-label="Toggle password visibility">
            <i class="ti ti-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn" id="submitBtn">
        <span id="btnText">Sign In</span>
        <i class="ti ti-arrow-right" id="btnArrow"></i>
        <div class="spinner" id="spinner"></div>
      </button>

    </form>

    <!-- Hint -->
    <div class="hint">
      Default credentials &nbsp;·&nbsp; <code>admin</code> / <code>Admin@123</code>
    </div>

  </div>

  <script>
    // ── Toggle password visibility ─────────────────────────
    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'ti ti-eye-off';
      } else {
        input.type = 'password';
        icon.className = 'ti ti-eye';
      }
    }

    // ── Show / hide error ──────────────────────────────────
    function showError(msg) {
      const box = document.getElementById('errorBox');
      document.getElementById('errorText').textContent = msg;
      box.classList.remove('show');
      void box.offsetWidth; // reflow to re-trigger animation
      box.classList.add('show');
    }
    function hideError() {
      document.getElementById('errorBox').classList.remove('show');
    }

    // ── Loading state ──────────────────────────────────────
    function setLoading(on) {
      const btn     = document.getElementById('submitBtn');
      const spinner = document.getElementById('spinner');
      const text    = document.getElementById('btnText');
      const arrow   = document.getElementById('btnArrow');
      btn.disabled          = on;
      spinner.style.display = on ? 'block' : 'none';
      arrow.style.display   = on ? 'none'  : '';
      text.textContent      = on ? 'Signing in…' : 'Sign In';
    }

    // ── Main login handler ─────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          // Store token
          localStorage.setItem('adminToken', data.token);

          // Success UI
          const btn = document.getElementById('submitBtn');
          btn.classList.add('success');
          document.getElementById('btnText').textContent = 'Success! Redirecting…';
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('btnArrow').style.display = '';

          setTimeout(() => {
            window.location.href = '/admin';
          }, 900);
        } else {
          setLoading(false);
          showError(data.message || 'Invalid credentials. Please try again.');
        }

      } catch (err) {
        setLoading(false);
        showError('Server error. Please check your connection and try again.');
        console.error('Login error:', err);
      }
    }

    // ── Auto-redirect if already logged in ────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('adminToken');
      if (token) {
        fetch('/api/admin/verify', {
          headers: { Authorization: 'Bearer ' + token }
        })
          .then(r => r.json())
          .then(d => { if (d.success) window.location.href = '/admin'; })
          .catch(() => { localStorage.removeItem('adminToken'); });
      }
    });
  </script>

</body>
</html>
